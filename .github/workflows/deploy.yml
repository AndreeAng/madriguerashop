name: Deploy

# Pipeline de deploy a Vercel. Solo corre en main después de que CI esté
# verde (depende del workflow_run de CI). Aplica migrations antes del
# deploy, levanta el deploy, y hace smoke test post-deploy.
#
# Secrets requeridos en GitHub repo settings → Secrets:
#   - VERCEL_TOKEN          (Account Settings → Tokens)
#   - VERCEL_ORG_ID         (Project Settings → General → Project ID parent)
#   - VERCEL_PROJECT_ID     (Project Settings → General → Project ID)
#   - PROD_DATABASE_URL     (URL de Postgres de producción)
#   - PROD_APP_URL          (https://madrigueras.shop)

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  # También permite trigger manual con override de SHA específico.
  workflow_dispatch:
    inputs:
      sha:
        description: "SHA específico a deployar (default: HEAD)"
        required: false

concurrency:
  # Solo un deploy a la vez. Si llega otro, espera al actual.
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Solo corre si el CI passed Y es push a main (no PR).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    defaults:
      run:
        working-directory: nibble

    # GitHub Actions no permite `${{ secrets.* }}` en `environment.url`.
    # Antes era `url: ${{ secrets.PROD_APP_URL }}` y rechazaba el workflow.
    # Si quieres un link clickable en la UI de GitHub Deployments, hardcodéalo
    # acá; el smoke test sigue usando $PROD_APP_URL desde secrets.
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nibble/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # ============================================================
      # 1) MIGRATIONS — ANTES del deploy del código.
      # Si las migrations fallan, abortamos y no deployamos. Esto evita
      # el escenario "código nuevo apunta a columna que aún no existe".
      # ============================================================
      - name: Apply migrations to production DB
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "::group::Migrations status"
          npx prisma migrate status || true
          echo "::endgroup::"
          echo "::group::Applying migrations"
          npx prisma migrate deploy
          echo "::endgroup::"

      # ============================================================
      # 2) Vercel deploy via API — buildea EN la infra de Vercel
      # ============================================================
      # NO usamos `vercel build --prebuilt` desde GH Actions porque las env
      # vars marcadas como "Sensitive" en el proyecto Vercel NO se pueden
      # pullear con `vercel pull` (security feature). Build prebuilt sin
      # esas envs queda con valores vacíos baked-in y el runtime devuelve
      # 503 (DATABASE_URL vacío, AUTH_SECRET vacío, etc.).
      #
      # Solución: trigger un deploy normal vía API. Vercel pulla el código
      # del repo en su propia infra, ve las envs Sensitive directamente,
      # buildea y deployea. Perdemos la velocidad del prebuilt cacheado
      # pero ganamos que el deploy realmente funcione.
      - name: Trigger Vercel deployment
        id: deploy
        working-directory: .
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          SHA: ${{ inputs.sha || github.sha }}
        run: |
          response=$(curl -sf -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${VERCEL_ORG_ID}&forceNew=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "madriguerashop",
              "project": "'"${VERCEL_PROJECT_ID}"'",
              "target": "production",
              "gitSource": {
                "type": "github",
                "repoId": "1228863434",
                "ref": "main",
                "sha": "'"${SHA}"'"
              }
            }')
          deployment_id=$(echo "$response" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);console.log(o.id||'');})")
          deployment_url=$(echo "$response" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);console.log(o.url||'');})")

          if [ -z "$deployment_id" ]; then
            echo "::error::Failed to trigger deployment"
            echo "$response" | head -50
            exit 1
          fi

          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"
          echo "deployment_url=https://$deployment_url" >> "$GITHUB_OUTPUT"
          echo "✓ Triggered: $deployment_id"
          echo "  Will alias to: https://$deployment_url"

      - name: Wait for deployment ready
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.deployment_id }}
        run: |
          # Hasta 10 min de wait (builds Next.js + Prisma típicamente 90-180s)
          for i in $(seq 1 30); do
            sleep 20
            state=$(curl -sf "https://api.vercel.com/v13/deployments/${DEPLOYMENT_ID}?teamId=${VERCEL_ORG_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);console.log(o.readyState||'UNKNOWN');})")
            echo "[$i] $state"
            case "$state" in
              READY) echo "✓ Deployment ready"; exit 0 ;;
              ERROR|CANCELED) echo "::error::Deployment failed with state $state"; exit 1 ;;
            esac
          done
          echo "::error::Timeout esperando deployment ready"
          exit 1

      # ============================================================
      # 3) Smoke test — el deploy puede haber subido pero la app puede
      # estar rota. /api/health debe responder 200 con el SHA actual.
      # ============================================================
      - name: Smoke test
        env:
          APP_URL: ${{ secrets.PROD_APP_URL }}
        run: |
          # Normalizar la URL: forzar https + sin trailing slash. Sin esto,
          # un PROD_APP_URL con http o trailing slash genera 308 redirects
          # que el curl no sigue por default.
          url="${APP_URL%/}"
          url="${url/http:\/\//https://}"
          echo "Health URL: ${url}/api/health"

          # Esperar 15s para que Vercel termine la propagación del alias
          sleep 15
          # 5 intentos con backoff exponencial. `-L` sigue redirects.
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            status=$(curl -sLf -o /dev/null -w "%{http_code}" "${url}/api/health" || echo "fail")
            if [[ "$status" == "200" ]]; then
              echo "✓ Smoke test passed (HTTP $status)"
              exit 0
            fi
            echo "  → status: $status"
            sleep $((2 ** i))
          done
          echo "✗ Smoke test failed después de 5 intentos"
          exit 1

      # ============================================================
      # 4) Rollback en caso de smoke test failure
      # Si el smoke falló, marcamos el deployment como fallido — Vercel
      # mantiene el deploy anterior live, así que la app vuelve sola.
      # ============================================================
      - name: Mark deployment failed (rollback automático Vercel)
        if: failure()
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "::error::Deploy falló — el deploy anterior sigue live. Investiga los logs antes del próximo push a main."
          # Vercel rolling deploys: el deploy anterior queda activo si éste falla
          # los health checks. Aquí podríamos llamar a `vercel rollback` si
          # quisiéramos ser explícitos, pero el comportamiento default ya cubre.
