name: CodeQL

# Análisis estático de seguridad de GitHub. Detecta SQL injection, XSS, path
# traversal, deserialization issues, etc. Corre en cada PR y semanalmente
# en main para captar nuevas reglas que GitHub agregue.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lunes 06:00 UTC. Picks up new CodeQL rules sin esperar al próximo PR.
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` incluye reglas extra de calidad de código
          # además de seguridad. Vale la pena para un SaaS que maneja dinero.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
