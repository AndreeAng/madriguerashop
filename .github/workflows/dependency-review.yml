name: Dependency Review

# Bloquea PRs que introducen dependencias con vulnerabilidades conocidas
# o licencias no permitidas. Solo corre en PRs (no en push directo a main).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
        with:
          # Bloquea PRs que agregan deps con vulnerabilidades de severidad
          # alta o crítica. Las moderadas se loguean pero no bloquean.
          fail-on-severity: high
          # Licencias permitidas — bloqueamos GPL/AGPL para evitar contaminación
          # legal (Nibble es propietaria). Si alguna dep usa una de éstas,
          # discutirlo antes del merge.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0
          # Comenta el PR con el resumen del análisis.
          comment-summary-in-pr: on-failure
